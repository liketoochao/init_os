<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>服务器批量配置工具</title>
    <style>
        body{font-family: "Microsoft YaHei";margin: 30px;background: #f5f7fa;}
        .box{max-width:600px;background:white;padding:25px;border-radius:10px;margin-bottom:20px;box-shadow:0 2px 10px #00000010;}
        input{width:100%;padding:10px;margin:5px 0;border:1px solid #ddd;border-radius:5px;}
        button{background:#007bff;color:white;padding:10px 20px;border:none;border-radius:5px;cursor:pointer;}
        .item{padding:10px;border-bottom:1px solid #eee;}
    </style>
</head>
<body>

<h2>🚀 服务器批量配置工具 - 首页</h2>

<div class="box">
    <h3>➕ 添加主机</h3>
    <input id="name" placeholder="主机名称"><br>
    <input id="ip" placeholder="主机IP"><br>
    <input id="port" value="22" placeholder="端口"><br>
    <input id="username" placeholder="账号"><br>
    <input id="password" placeholder="密码" type="password"><br>
    <button onclick="addHost()">保存主机</button>
</div>

<div class="box">
    <h3>📋 我的主机列表</h3>
    <div id="hostList"></div>
</div>

<script>
    // 添加主机
    function addHost() {
        let data = {
            name: document.getElementById("name").value,
            ip: document.getElementById("ip").value,
            port: document.getElementById("port").value,
            username: document.getElementById("username").value,
            password: document.getElementById("password").value
        };

        fetch("/host/add", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        }).then(res => res.json()).then(d => {
            alert(d.msg);
            if (d.code === 200) {
                loadHostList();
            }
        });
    }

    // 加载主机列表
    function loadHostList() {
        fetch("/host/my_list")
            .then(res => res.json())
            .then(d => {
                let html = "";
                d.data.forEach(h => {
                    html += `
                    <div class="item">
                        <strong>${h.name}</strong> | ${h.ip}:${h.port}<br>
                        账号：${h.username}
                    </div>`;
                });
                document.getElementById("hostList").innerHTML = html;
            });
    }

    // 页面加载时自动显示主机
    window.onload = loadHostList;
</script>

</body>
</html>
