<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服务器批量配置工具 V3 - 登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", Arial, sans-serif;
        }

        /* 科技感动态背景 */
        body {
            background: linear-gradient(135deg, #0f1a2c 0%, #1f3a60 50%, #2a5298 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            background-attachment: fixed;
            position: relative;
            overflow: hidden;
        }

        /* 浮动光点装饰 */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                    radial-gradient(circle at 20% 30%, rgba(70, 130, 180, 0.15) 0%, transparent 25%),
                    radial-gradient(circle at 80% 70%, rgba(30, 144, 255, 0.1) 0%, transparent 25%);
            pointer-events: none;
            z-index: 0;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.97);
            padding: 40px 35px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 420px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            z-index: 1;
        }

        /* LOGO区域 */
        .logo-box {
            text-align: center;
            margin-bottom: 20px;
        }
        .logo-icon {
            width: 70px;
            height: 70px;
            line-height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, #007bff, #0056b3);
            color: #fff;
            font-size: 32px;
            display: inline-block;
            margin-bottom: 10px;
        }
        .system-version {
            font-size: 13px;
            color: #888;
        }

        .login-title {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 22px;
            font-weight: 700;
            position: relative;
            padding-bottom: 12px;
        }

        .login-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 70px;
            height: 3px;
            background: #007bff;
            border-radius: 3px;
        }

        /* 系统公告 */
        .notice-box {
            background: #f0f7ff;
            border: 1px solid #cce0f5;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 25px;
            font-size: 13px;
            color: #2c5282;
        }
        .notice-title {
            font-weight: 600;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-label {
            display: block;
            text-align: left;
            margin-bottom: 8px;
            color: #34495e;
            font-size: 14px;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 13px 16px;
            border: 1px solid #e0e6ed;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s ease;
            background: #fff;
        }

        .form-input:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 0 4px rgba(0, 123, 255, 0.1);
        }

        /* 记住密码 */
        .remember-row {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            margin-bottom: 24px;
            font-size: 14px;
            color: #555;
            gap: 8px;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #007bff, #0056b3);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0, 123, 255, 0.25);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* 错误提示默认无边框底色 */
        .error-message {
            color: #dc3545;
            font-size: 13px;
            text-align: center;
            margin-bottom: 18px;
            min-height: 18px;
            padding: 0;
            border-radius: 0;
            background: transparent;
            border: none;
        }

        /* 管理员说明 */
        .admin-desc {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            color: #666;
            line-height: 1.6;
        }

        .login-footer {
            text-align: center;
            margin-top: 25px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            z-index: 1;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }
        }
    </style>
</head>

<body>
    <div class="login-container">
        <!-- LOGO与版本区域 -->
        <div class="logo-box">
            <div class="logo-icon">⚙</div>
            <h2 class="login-title">服务器批量配置工具</h2>
            <div class="system-version">当前系统版本：V3.0.0</div>
        </div>

        <!-- 系统公告 -->
        <div class="notice-box">
            <div class="notice-title">📢 系统公告</div>
            <div>仅限内部管理员登录使用，请勿泄露账号密码；系统维护时段暂停服务</div>
        </div>

        <div class="error-message" id="errorMsg"></div>

        <form method="post" onsubmit="return validateForm()">
            <div class="form-group">
                <label class="form-label">账号</label>
                <input id="username" name="username" class="form-input" placeholder="请输入管理员账号" type="text" required>
            </div>

            <div class="form-group">
                <label class="form-label">密码</label>
                <input id="password" name="password" class="form-input" placeholder="请输入密码" type="password" required>
            </div>

            <!-- 记住密码 -->
            <div class="remember-row">
                <input type="checkbox" id="remember">
                <label for="remember">记住密码（本地加密存储）</label>
            </div>

            <button type="submit" id="loginBtn" class="submit-btn">安全登录</button>
        </form>

        <!-- 管理员说明 -->
        <div class="admin-desc">
            管理员热线：13800138000<br>
            技术支持：运维管理部
        </div>
    </div>

    <div class="login-footer">
        © 2025 服务器批量配置工具 | 安全 · 高效 · 稳定
    </div>

    <script>
        // 按钮加载状态
        const loginBtn = document.getElementById('loginBtn');
        const errorMsg = document.getElementById('errorMsg');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const rememberCheck = document.getElementById('remember');

        // 页面加载时读取记住的密码
        window.onload = function() {
            // 显示后端返回的错误
            const urlParams = new URLSearchParams(window.location.search);
            const err = urlParams.get('error');
            if (err) errorMsg.textContent = decodeURIComponent(err);

            // 读取本地记住的账号密码
            const remember = localStorage.getItem('remember_me') === 'true';
            if (remember) {
                usernameInput.value = localStorage.getItem('user') || '';
                passwordInput.value = localStorage.getItem('pwd') || '';
                rememberCheck.checked = true;
            }
        };

        // 表单验证 + 记住密码 + 防重复提交
        function validateForm() {
            const user = usernameInput.value.trim();
            const pwd = passwordInput.value.trim();
            errorMsg.textContent = '';

            if (!user) {
                errorMsg.textContent = '请输入账号';
                return false;
            }
            if (!pwd) {
                errorMsg.textContent = '请输入密码';
                return false;
            }
            if (pwd.length < 6) {
                errorMsg.textContent = '密码长度不能少于6位';
                return false;
            }

            // 防重复提交：按钮禁用 + 显示加载
            loginBtn.disabled = true;
            loginBtn.textContent = '登录中...';

            // 记住密码
            if (rememberCheck.checked) {
                localStorage.setItem('remember_me', 'true');
                localStorage.setItem('user', user);
                localStorage.setItem('pwd', pwd);
            } else {
                localStorage.removeItem('remember_me');
                localStorage.removeItem('user');
                localStorage.removeItem('pwd');
            }

            return true;
        }
    </script>
</body>
</html>
